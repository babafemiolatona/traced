version: '3.8'

services:
  verifier:
    image: traced-verifier:latest
    build:
      context: ./verifier
      dockerfile: Dockerfile
    container_name: traced-verifier
    environment:
      TARGET_URL: ${TARGET_URL}
      WORKERS: ${WORKERS}
      DURATION: ${DURATION}
      RATE_PER_WORKER: ${RATE_PER_WORKER}
      BATCH_SIZE: ${BATCH_SIZE}
      WINDOW_MINUTES: ${WINDOW_MINUTES}
      VERIFY_TIMEOUT_SECONDS: ${VERIFY_TIMEOUT_SECONDS}
    ports:
      - "8081:8080"
    depends_on:
      - app
    networks:
      - traced-net

  app:
    image: traced-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traced-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      WINDOW_MINUTES: ${WINDOW_MINUTES}
    networks:
      - traced-net

networks:
  traced-net:
    driver: bridge